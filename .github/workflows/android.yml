name: Build Android APK
on:
  push:
    branches: [ main, master ] # သင့် main သို့မဟုတ် master branch ထဲ ကုဒ်တွန်းရင် အလုပ်လုပ်မယ်

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor & Dependencies
        run: |
          # Error တက်စေသော package.json အဟောင်းရှိလျှင် အရင်ဖျက်ပစ်ခြင်း
          rm -f package.json package-lock.json || true
          
          # ပတ်ဝန်းကျင်အသစ်တွင် အသစ်ပြန်စခြင်း
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          
          # www folder ရှိပြီးသားဖြစ်ပါက ထပ်မဆောက်ဘဲ ကျော်သွားရန်
          mkdir -p www
          cp *.html www/ || true
          cp *.js www/ || true
          cp *.css www/ || true
          
          # Capacitor Init နှင့် Android Platform ထည့်ခြင်း
          npx cap init "Monica Energy" "com.monica.energy" --web-dir=www
          npx cap add android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # FIXED: Java 17 မှ 21 သို့ တိုးမြှင့်လိုက်သည်

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monica-Energy-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
