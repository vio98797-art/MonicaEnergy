name: Build Android APK
on:
  push:
    branches: [ main, master ] # သင့် main branch ထဲ ကုဒ်တွန်းရင် အလုပ်လုပ်မယ်

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20'

      - name: Install Capacitor & Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          # Web Assets Directory ဆောက်ပြီး HTML များ ရွှေ့ခြင်း (Capacitor လိုအပ်ချက်)
          mkdir www
          cp *.html www/ || true
          cp *.js www/ || true
          cp *.css www/ || true
          # Capacitor Init လုပ်ခြင်း
          npx cap init "Monica Energy" "com.monica.energy" --web-dir=www
          npx cap add android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monica-Energy-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
