name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor & Dependencies
        run: |
          rm -f package.json package-lock.json || true
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          
          mkdir -p www
          cp *.html www/ || true
          cp *.js www/ || true
          cp *.css www/ || true
          
          npx cap init "Monica Energy" "com.monica.energy" --web-dir=www
          npx cap add android

      # FIXED: Kotlin Duplicate Classes ကို ဖယ်ရှားပေးမည့် အဆင့်
      - name: Fix Kotlin Duplicate Classes Error
        run: |
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          EOF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monica-Energy-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
