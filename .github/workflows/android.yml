name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project Structure
        run: |
          # လက်ရှိ ရှိပြီးသား ဖိုင်များကို မထိခိုက်စေဘဲ Cordova scaffold ဆောက်ခြင်း
          cordova create cordova_build com.monica.energy MonicaEnergy
          
          # သင့်ပရောဂျက်ထဲက www နှင့် config.xml ကို build folder ထဲ ကူးထည့်ခြင်း
          cp -r www/* cordova_build/www/
          cp config.xml cordova_build/config.xml || true

      - name: Add Android Platform
        run: |
          cd cordova_build
          cordova platform add android

      - name: Build Android APK (Debug)
        run: |
          cd cordova_build
          cordova build android --debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: MonicaEnergy-APK
          path: cordova_build/platforms/android/app/build/outputs/apk/debug/*.apk

